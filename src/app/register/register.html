<div class="min-h-screen flex items-center justify-center p-4 bg-gray-50">
  <div class="w-full max-w-md">
    <!-- Removed animate-pulse-slow, using standard Tailwind animation -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-indigo-600">Create Account</h1>
      <p class="text-gray-600 mt-2">Join our community today</p>
    </div>

    <!-- Changed register-card to standard Tailwind classes -->
    <div class="bg-white rounded-xl shadow-lg p-8 sm:p-10">
      <form>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">
          <div>
            <label for="first-name" class="block text-sm font-medium text-gray-700 mb-1"
              >First Name</label
            >
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i class="fas fa-user text-gray-400"></i>
              </div>
              <input
                type="text"
                id="first-name"
                [(ngModel)]="firstName"
                name="firstName"
                class="w-full pl-10 pr-3 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200"
                placeholder="John"
                required
              />
            </div>
          </div>

          <div>
            <label for="last-name" class="block text-sm font-medium text-gray-700 mb-1"
              >Last Name</label
            >
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i class="fas fa-user text-gray-400"></i>
              </div>
              <input
                type="text"
                id="last-name"
                [(ngModel)]="lastName"
                name="lastName"
                class="w-full pl-10 pr-3 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200"
                placeholder="Doe"
                required
              />
            </div>
          </div>
        </div>

        <div class="mb-5">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1"
            >Email Address</label
          >
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-envelope text-gray-400"></i>
            </div>
            <input
              type="email"
              id="email"
              [(ngModel)]="email"
              name="email"
              class="w-full pl-10 pr-3 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200"
              placeholder="you@example.com"
              required
            />
          </div>
        </div>

        <div class="mb-5">
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1"
            >Username</label
          >
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-user text-gray-400"></i>
              <!-- Fixed icon -->
            </div>
            <input
              type="text"
              id="username"
              [(ngModel)]="username"
              name="username"
              class="w-full pl-10 pr-3 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200"
              placeholder="john_doe"
            />
          </div>
        </div>

        <div class="mb-5">
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1"
            >Password</label
          >
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-lock text-gray-400"></i>
            </div>
            <input
              type="password"
              id="password"
              [(ngModel)]="password"
              name="password"
              class="w-full pl-10 pr-3 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200"
              placeholder="••••••••"
              required
            />
          </div>
          <div class="mt-2">
            <!-- Password strength indicator using Tailwind -->
            <div class="w-full h-1 bg-gray-200 rounded-full overflow-hidden">
              <div class="h-full bg-yellow-500 w-2/3"></div>
              <!-- Medium strength = 2/3 width -->
            </div>
            <p class="text-xs text-gray-500 mt-1">
              Minimum 8 characters. Use a mix of letters, numbers and symbols for strength.
            </p>
          </div>
        </div>

        <div class="mb-5">
          <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-1"
            >Confirm Password</label
          >
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fas fa-lock text-gray-400"></i>
            </div>
            <input
              type="password"
              id="confirm-password"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              class="w-full pl-10 pr-3 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200"
              placeholder="••••••••"
              required
            />
          </div>
        </div>

        @if (errorMessage) {
        <p class="mb-3 text-sm text-red-600">{{ errorMessage }}</p>
      }
        <button
          (click)="submit()"
          type="button"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-300 transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 shadow-md"
        >
          Create Account
        </button>

        <div class="mt-8 text-center">
          <p class="text-gray-600 text-sm">
            Already have an account?
            <a routerLink="/login" class="font-medium text-indigo-600 hover:text-indigo-500 transition"
              >Sign in</a
            >
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
